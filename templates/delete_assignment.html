<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ยืนยันการลบ - Student Tracker</title>
    <style>
        /* พื้นหลังสีครีมตามสไตล์หลักของแอป */
        body {
            background-color: #FAF6E9;
            font-family: 'Kanit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* กล่องยืนยันการลบ */
        .confirm-card {
            background-color: #ffffff;
            width: 90%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        /* ไอคอนแจ้งเตือน */
        .warning-icon {
            font-size: 60px;
            color: #ef4444; /* สีแดงสำหรับแจ้งเตือน */
            margin-bottom: 20px;
        }

        h2 {
            color: #103589; /* สีน้ำเงินประจำแบรนด์ */
            margin-bottom: 15px;
            font-size: 24px;
        }

        p {
            color: #64748b;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* กลุ่มปุ่มกด */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ปุ่มยืนยันการลบ */
        .btn-delete-confirm {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-delete-confirm:hover {
            background-color: #dc2626;
        }

        /* ปุ่มยกเลิกกลับไปหน้าเดิม */
        .btn-back {
            background-color: transparent;
            color: #103589;
            border: 2px solid #103589;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-back:hover {
            background-color: #103589;
            color: white;
        }
    </style>
</head>
<body>

    <div class="confirm-card">
        <div class="warning-icon">⚠️</div>
        <h2>แน่ใจใช่มั้ยว่าจะลบข้อมูล?</h2>
        <p>การดำเนินการนี้ไม่สามารถย้อนกลับได้ <br> ข้อมูลงานของคุณจะถูกลบออกจากระบบถาวร</p>
        
        <div class="button-group">
            <button class="btn-delete-confirm" onclick="deleteAndRedirect()">ใช่, ฉันต้องการลบ</button>
            
            <a href="/assignment" class="btn-back">ไม่, ยกเลิก</a>
        </div>
    </div>

    <script>
        function deleteAndRedirect() {
            // ในอนาคตคุณสามารถใส่ Logic ลบฐานข้อมูลตรงนี้
            // เมื่อลบเสร็จให้เด้งไปหน้า assignment ทันทีตามที่คุณต้องการ
            window.location.href = '/assignment'; 
        }
    </script>

</body>
</html>
