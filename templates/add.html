{% extends 'base.html' %}
{% block content %}
<div class="table-container" style="max-width: 600px; margin: auto;">
    <h2>บันทึกข้อมูลงาน</h2>
    <form action="/add" method="POST">
    <div class="mb-3">
        <label>ชื่อกิจกรรม/งาน</label>
        <input type="text" name="title" class="auth-input" placeholder="เช่น โปรเจกต์ AI" required>
    </div>
    <div class="mb-3">
        <label>วิชา</label>
        <input type="text" name="subject" class="auth-input" placeholder="วิชาเรียน" required>
    </div>
    <div class="mb-3">
        <label>วันกำหนดส่ง</label>
        <input type="date" name="due_date" class="auth-input" required>
    </div>
    <div class="mb-3">
        <label>สถานะ</label>
        <select name="status" class="auth-input">
            <option value="Pending">Pending</option>
            <option value="Doing">Doing</option>
            <option value="Completed">Completed</option>
        </select>
    </div>
    <button type="submit" class="btn-primary" style="width: 100%; background-color: #4e73df; color: white; border: none; padding: 10px; border-radius: 8px;">
        บันทึกข้อมูล
    </button>
</form>
</div>
{% endblock %}
