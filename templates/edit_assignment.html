{% extends "base.html" %}
{% block content %}

<h2>Edit Assignment</h2>
<form method="POST">
<input name="title" value="{{assignment.title}}" class="form-control mb-2">
<textarea name="description" class="form-control mb-2">{{assignment.description}}</textarea>
<select name="status" class="form-control mb-2">
<option {% if assignment.status=='Pending' %}selected{% endif %}>Pending</option>
<option {% if assignment.status=='Doing' %}selected{% endif %}>Doing</option>
<option {% if assignment.status=='Done' %}selected{% endif %}>Done</option>
</select>
<button class="btn btn-primary">Update</button>
</form>

{% endblock %}
