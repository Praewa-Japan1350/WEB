<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Assignment - Student Tracker</title>
    <style>
        /* 1. พื้นหลังสีครีมตามความต้องการเดิม */
        body {
            background-color: #FAF6E9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* 2. กล่องแก้ไขข้อมูล */
        .edit-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        /* 3. หัวข้อใช้สีน้ำเงิน #103589 ตามที่ระบุ */
        h2 {
            color: #103589;
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
        }

        /* 4. ช่อง Input และ Select */
        input[type="text"], 
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #C4D3E5;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            border-color: #103589;
        }

        /* 5. ปุ่มบันทึกสีน้ำเงิน #103589 */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #103589;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background-color: #0a2561;
        }

        /* ปุ่มยกเลิก */
        .btn-cancel {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-cancel:hover {
            color: #103589;
        }
    </style>
</head>
<body>

    <div class="edit-card">
        <h2>แก้ไขงาน (Edit)</h2>
        
        <form action="update_process.php" method="POST">
            <input type="hidden" name="id" value="1">

            <div class="form-group">
                <label for="title">ชื่อหัวข้อ / วิชา</label>
                <input type="text" id="title" name="title" value="การบ้านวิชาภาษาไทย">
            </div>

            <div class="form-group">
                <label for="status">สถานะงาน</label>
                <select id="status" name="status">
                    <option value="total">Total (ทั้งหมด)</option>
                    <option value="pending" selected>Pending (รอดำเนินการ)</option>
                    <option value="doing">Doing (กำลังทำ)</option>
                    <option value="done">Done (เสร็จสิ้น)</option>
                </select>
            </div>

            <button type="button" class="btn-submit" onclick="window.location.href='/assignment';" >บันทึกการเปลี่ยนแปลง</button>
            <a href="/assignment" class="btn-cancel">ยกเลิกและกลับหน้าหลัก</a>
        </form>
    </div>

</body>
</html>
