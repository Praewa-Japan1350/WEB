<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password | Student Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-box">
        <div style="margin-bottom: 20px;">
            <i class="fas fa-lock-open fa-3x" style="color: #f6c23e;"></i>
        </div>
        <h2 style="color: #343a5f;">ลืมรหัสผ่าน?</h2>
        <p style="color: #a0aec0; margin-bottom: 20px; font-size: 0.9rem;">
            ระบุอีเมลที่คุณใช้ลงทะเบียน เพื่อรับลิงก์สำหรับตั้งรหัสผ่านใหม่
        </p>
        
        <form action="/login">
            <input type="email" class="auth-input" placeholder="Enter your email" required>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">
                Send Reset Link
            </button>
        </form>
        
        <div style="margin-top: 20px; font-size: 0.9rem;">
            <a href="/login" style="color: #4e73df; text-decoration: none;">
                <i class="fas fa-arrow-left"></i> กลับไปหน้า Login
            </a>
        </div>
    </div>
</body>
</html>
