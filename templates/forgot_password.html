{% extends "base.html" %}
{% block content %}

<div class="fullscreen-center">
  <div class="auth-card">
    <h2>Forgot Password</h2>
    <p style="color: gray;">Enter your email address</p>

    <form method="POST">
        <input type="email" name="email" placeholder="Enter email address" required>
        <button type="submit">Continue</button>
    </form>
</div>

{% endblock %}
