{% extends 'base.html' %}
{% block content %}
<link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.css' rel='stylesheet' />
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.js'></script>

<div class="table-container" style="background: white; padding: 20px; border-radius: 15px;">
    <div id='calendar'></div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      locale: 'th',
      events: [
        { title: 'Physics Lab Report', start: '2026-03-12', color: '#ff85a1' }, 
        { title: 'term project', start: '2026-03-07', color: '#fd7e14' },       
        { title: 'create web', start: '2026-03-01', color: '#4e73df' },         
        { title: 'my birthday 🎂', start: '2026-03-01', color: '#6f42c1' }      
      ]
    });
    calendar.render();
  });
</script>

<style>
  .fc-event-title {
    font-family: 'Sarabun', sans-serif;
    font-weight: 500;
    padding: 2px;
  }
</style>
{% endblock %}
