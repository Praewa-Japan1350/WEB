<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo-section"><div class="logo-circle">PK</div><div><h3>Student Tracker</h3></div></div>
        <nav>
            <a href="/dashboard" class="nav-item"><i class="fas fa-home"></i> Home</a>
            <a href="/assignment" class="nav-item"><i class="fas fa-tasks"></i> Dashboard</a>
            <a href="/calender" class="nav-item"><i class="fas fa-calendar"></i> Calendar</a>
            <a href="/subjects" class="nav-item"><i class="fas fa-book"></i> Subjects</a>
            <a href="/grades" class="nav-item"><i class="fas fa-graduation-cap"></i> Grades</a>
            <a href="/pomodoro" class="nav-item"><i class="fas fa-clock"></i> Pomodoro</a>
            <a href="/notes" class="nav-item"><i class="fas fa-sticky-note"></i> Notes</a>
            <a href="/profile" class="nav-item"><i class="fas fa-user"></i> Profile</a>
            <a href="/about" class="nav-item"><i class="fas fa-info-circle"></i> About</a>
        </nav>
        <a href="/login" class="nav-item" style="margin-top:auto;"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
    <div class="main-content">{% block content %}{% endblock %}</div>
</body>
</html>
