<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Subjects Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .subject-card { transition: transform 0.2s; }
        .subject-card:hover { transform: translateY(-4px); }
        .modal-bg { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="p-8">

    <div class="max-w-6xl mx-auto flex justify-between items-center mb-10">
        <h1 class="text-3xl font-bold text-[#1e3a8a]">My Subjects</h1>
        <button onclick="openModal()" class="bg-[#4f46e5] hover:bg-[#4338ca] text-white px-6 py-2.5 rounded-lg font-semibold flex items-center gap-2 shadow-md transition-all">
            <span>+ Add New Subject</span>
        </button>
    </div>

    <div id="subjectContainer" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="subject-card bg-white p-6 rounded-2xl shadow-sm border-l-[6px] border-blue-600 flex flex-col justify-between">
            <div>
                <div class="flex justify-between items-center mb-1">
                    <h3 class="text-xl font-bold text-gray-800">AI Engineering</h3>
                    <span class="text-blue-200 text-xl">🧠</span>
                </div>
                <p class="text-gray-400 text-sm mb-6">Code: AI-101 | Credits: 3</p>
            </div>
            <div>
                <div class="w-full bg-gray-100 h-2.5 rounded-full overflow-hidden flex items-center mb-1">
                    <div class="bg-blue-600 h-full rounded-full" style="width: 75%"></div>
                </div>
                <p class="text-right text-sm font-bold text-gray-600">75%</p>
            </div>
        </div>
    </div>

    <div id="modal" class="modal-bg fixed inset-0 hidden flex items-center justify-center z-50">
        <div class="bg-white w-full max-w-md p-8 rounded-3xl shadow-2xl mx-4">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">เพิ่มรายวิชาใหม่</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อวิชา</label>
                    <input type="text" id="nameInp" placeholder="เช่น Calculus I" class="w-full border border-gray-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">รหัสวิชา</label>
                    <input type="text" id="codeInp" placeholder="เช่น MATH-111" class="w-full border border-gray-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">หน่วยกิต</label>
                        <input type="number" id="creditInp" value="3" class="w-full border border-gray-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">ความคืบหน้า (%)</label>
                        <input type="number" id="progInp" value="0" class="w-full border border-gray-200 p-3 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
            </div>

            <div class="flex gap-3 mt-8">
                <button onclick="closeModal()" class="flex-1 py-3 text-gray-500 font-semibold hover:bg-gray-50 rounded-xl transition-colors">ยกเลิก</button>
                <button onclick="addSubject()" class="flex-1 py-3 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 shadow-lg transition-all">บันทึกข้อมูล</button>
            </div>
        </div>
    </div>

    <script>
        const colors = ['#2563eb', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'];
        const icons = ['📊', '🧪', '📚', '💻', '📝'];

        function openModal() {
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        function addSubject() {
            const name = document.getElementById('nameInp').value;
            const code = document.getElementById('codeInp').value;
            const credits = document.getElementById('creditInp').value;
            const progress = document.getElementById('progInp').value;

            if(!name || !code) {
                alert("กรุณากรอกชื่อและรหัสวิชาครับคุณ Japan");
                return;
            }

            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            const randomIcon = icons[Math.floor(Math.random() * icons.length)];

            const container = document.getElementById('subjectContainer');
            
            // สร้าง Card ใหม่
            const cardHtml = `
                <div class="subject-card bg-white p-6 rounded-2xl shadow-sm border-l-[6px] flex flex-col justify-between" style="border-color: ${randomColor}">
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <h3 class="text-xl font-bold text-gray-800">${name}</h3>
                            <span class="text-xl" style="opacity: 0.3">${randomIcon}</span>
                        </div>
                        <p class="text-gray-400 text-sm mb-6">Code: ${code} | Credits: ${credits}</p>
                    </div>
                    <div>
                        <div class="w-full bg-gray-100 h-2.5 rounded-full overflow-hidden flex items-center mb-1">
                            <div class="h-full rounded-full" style="width: ${progress}%; background-color: ${randomColor}"></div>
                        </div>
                        <p class="text-right text-sm font-bold text-gray-600">${progress}%</p>
                    </div>
                </div>
            `;

            container.insertAdjacentHTML('beforeend', cardHtml);
            
            // ปิด Modal และล้างข้อมูล
            closeModal();
            document.getElementById('nameInp').value = '';
            document.getElementById('codeInp').value = '';
        }
    </script>
</body>
</html>
